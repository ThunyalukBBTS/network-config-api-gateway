name: project
topology:
  nodes:
    router:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux
      mgmt-ipv4: 172.20.20.2
    host1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      mgmt-ipv4: 172.20.20.3
    host2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      mgmt-ipv4: 172.20.20.4
  links:
    - endpoints: ["router:e1-1", "host1:eth1"]
    - endpoints: ["router:e1-2", "host2:eth1"]
