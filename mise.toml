[env]
DATABASE_URL = "postgresql://postgres:postgres@localhost:5432/network_gateway"

[tasks.db-up]
description = "Start PostgreSQL database with Docker Compose"
run = "docker compose -f docker/docker-compose.yml up -d"

[tasks.db-down]
description = "Stop PostgreSQL database"
run = "docker compose -f docker/docker-compose.yml down"

[tasks.db-logs]
description = "View PostgreSQL logs"
run = "docker compose -f docker/docker-compose.yml logs -f"

[tasks.db-reset]
description = "Reset database (down, remove volumes, up)"
run = "docker compose -f docker/docker-compose.yml down -v && docker compose -f docker/docker-compose.yml up -d"

[tasks.migrate]
description = "Run database migrations"
run = "cd backend && bun src/db/migrate.ts"

[tasks.seed]
description = "Seed database with initial data"
run = "cd backend && bun src/db/seed.ts"

[tasks.dev]
description = "Start development server with hot reload"
run = "cd backend && bun --hot src/index.ts"

[tasks.console]
description = "Connect to Cisco console via serial port"
run = "screen /dev/ttyACM0 9600"

[tasks.build]
description = "Build the project"
run = "cd backend && bun build src/index.ts --outdir ./dist --target bun"

[tasks.start]
description = "Start production server"
run = "cd backend && bun dist/index.js"

[tasks.test]
description = "Run tests"
run = "cd backend && bun test"

[tasks.lint]
description = "Lint code"
run = "cd backend && biome check src/"

[tasks.format]
description = "Format code"
run = "cd backend && biome format --write src/"

[tasks.clean]
description = "Clean build artifacts"
run = "cd backend && rm -rf dist/"

[tasks.clab-up]
description = "Start containerlab"
run = "cd containerlab && containerlab deploy -t project.clab.yml"

[tasks.clab-down]
description = "Stop and clean containerlab"
run = "cd containerlab && containerlab destroy -t project.clab.yml --"

[tasks.enter-router]
description = "Docker execute into srlinux container"
run = "docker exec -it clab-project-router sr_cli"

[tasks.enter-host1]
description = "Docker execute into srlinux container"
run = "docker exec -it clab-project-host1 sh"

[tasks.enter-host2]
description = "Docker execute into srlinux container"
run = "docker exec -it clab-project-host2 sh"